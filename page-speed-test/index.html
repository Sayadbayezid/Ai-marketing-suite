<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PageSpeed Audit</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --border: #e5e7eb;
            --pass: #0cce6b;
            --avg: #ffa400;
            --fail: #ff4e42;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); padding: 2rem 1rem; }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Search Bar */
        .search-box { display: flex; gap: 10px; margin-bottom: 2rem; background: var(--card-bg); padding: 1rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .search-box input { flex: 1; padding: 12px 20px; border: 1px solid var(--border); border-radius: 50px; font-size: 1rem; outline: none; }
        .search-box button { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 1rem; transition: opacity 0.2s; }
        .search-box button:hover { opacity: 0.9; }

        /* Metrics Grid */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .metric-card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .metric-card h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
        .metric-card .value { font-size: 2rem; font-weight: 800; }
        
        .score-pass { color: var(--pass); }
        .score-avg { color: var(--avg); }
        .score-fail { color: var(--fail); }

        /* Detailed Reports (Accordions) */
        .section-title { margin: 2rem 0 1rem; font-size: 1.5rem; color: var(--text-main); border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
        
        .audit-item { background: var(--card-bg); margin-bottom: 1rem; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        .audit-header { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; background: #fafafa; }
        .audit-header:hover { background: #f1f5f9; }
        .audit-savings { color: var(--fail); font-size: 0.9rem; }
        
        .audit-body { padding: 0 1.5rem; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease; }
        .audit-body.active { max-height: 1000px; padding: 1.5rem; border-top: 1px solid var(--border); }
        .audit-body p { margin-bottom: 1rem; font-size: 0.95rem; color: var(--text-muted); }

        /* Tables for File URLs */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); word-break: break-all; }
        th { background: #f8fafc; font-weight: 600; color: var(--text-muted); }
        td a { color: var(--primary); text-decoration: none; }
        td a:hover { text-decoration: underline; }

        /* Loading State */
        .loader { display: none; text-align: center; margin: 2rem 0; font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <input type="url" id="urlInput" placeholder="Enter web page URL (e.g., https://www.example.com)" required>
        <button onclick="runAudit()">Run Free Audit</button>
    </div>

    <div id="loader" class="loader">Analyzing page... This may take up to 30 seconds.</div>

    <div id="results" style="display: none;">
        <!-- Top Metrics -->
        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Performance Score</h3>
                <div id="overallScore" class="value">0</div>
            </div>
            <div class="metric-card">
                <h3>First Contentful Paint</h3>
                <div id="fcp" class="value">0 s</div>
            </div>
            <div class="metric-card">
                <h3>Largest Contentful Paint</h3>
                <div id="lcp" class="value">0 s</div>
            </div>
            <div class="metric-card">
                <h3>Total Blocking Time</h3>
                <div id="tbt" class="value">0 ms</div>
            </div>
        </div>

        <!-- Opportunities Section -->
        <h2 class="section-title">Opportunities (Actionable Fixes)</h2>
        <div id="opportunitiesContainer"></div>

        <!-- Diagnostics Section -->
        <h2 class="section-title">Diagnostics</h2>
        <div id="diagnosticsContainer"></div>
    </div>
</div>

<script>
    // Configuration
    const API_KEY = 'AIzaSyD6-aTvlvX_1jHMMfCi-nCAwLe2_JIjB1A'; // Add your Google API Key if you face rate limits, otherwise leave empty
    const API_URL = 'https://www.googleapis.com/pagespeedonline/v5/runPagespeed';

    async function runAudit() {
        const url = document.getElementById('urlInput').value;
        if (!url) return alert('Please enter a valid URL');

        document.getElementById('loader').style.display = 'block';
        document.getElementById('results').style.display = 'none';

        try {
            const query = `${API_URL}?url=${encodeURIComponent(url)}&category=performance&strategy=desktop${API_KEY ? '&key=' + API_KEY : ''}`;
            const response = await fetch(query);
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            parseAndRenderData(data.lighthouseResult);
        } catch (error) {
            alert(`Error: ${error.message}`);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function parseAndRenderData(lighthouse) {
        // 1. Render Top Level Metrics
        const score = Math.round(lighthouse.categories.performance.score * 100);
        const fcp = lighthouse.audits['first-contentful-paint'].displayValue;
        const lcp = lighthouse.audits['largest-contentful-paint'].displayValue;
        const tbt = lighthouse.audits['total-blocking-time'].displayValue;

        const scoreEl = document.getElementById('overallScore');
        scoreEl.innerText = score;
        scoreEl.className = `value ${getColorClass(score / 100)}`;
        
        document.getElementById('fcp').innerText = fcp;
        document.getElementById('lcp').innerText = lcp;
        document.getElementById('tbt').innerText = tbt;

        // 2. Parse Deep Audits (Opportunities & Diagnostics)
        const audits = lighthouse.audits;
        const auditRefs = lighthouse.categories.performance.auditRefs;

        const opportunities = [];
        const diagnostics = [];

        auditRefs.forEach(ref => {
            const audit = audits[ref.id];
            // Skip passed audits or audits without details
            if (!audit || audit.score >= 0.9 || !audit.details) return;

            if (audit.details.type === 'opportunity') {
                opportunities.push(audit);
            } else if (ref.group === 'diagnostics') {
                diagnostics.push(audit);
            }
        });

        // 3. Render HTML for Opportunities
        renderAuditList(opportunities, 'opportunitiesContainer');
        
        // 4. Render HTML for Diagnostics
        renderAuditList(diagnostics, 'diagnosticsContainer');

        document.getElementById('results').style.display = 'block';
    }

    function renderAuditList(auditArray, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        if (auditArray.length === 0) {
            container.innerHTML = '<p style="color: green;">All good here! No issues found.</p>';
            return;
        }

        auditArray.forEach(audit => {
            const wrapper = document.createElement('div');
            wrapper.className = 'audit-item';

            // Extract potential savings text
            let savingsText = audit.displayValue || '';

            // Extract table items (the exact files causing issues)
            let tableHTML = '';
            if (audit.details && audit.details.items && audit.details.items.length > 0) {
                tableHTML = buildTable(audit.details);
            }

            wrapper.innerHTML = `
                <div class="audit-header" onclick="toggleAccordion(this)">
                    <span>⚠️ ${audit.title}</span>
                    <span class="audit-savings">${savingsText} ▾</span>
                </div>
                <div class="audit-body">
                    <p>${formatDescription(audit.description)}</p>
                    ${tableHTML}
                </div>
            `;
            container.appendChild(wrapper);
        });
    }

    function buildTable(details) {
        const headings = details.headings || [];
        const items = details.items || [];
        
        if (headings.length === 0 || items.length === 0) return '';

        let html = '<table><thead><tr>';
        headings.forEach(h => html += `<th>${h.label}</th>`);
        html += '</tr></thead><tbody>';

        items.forEach(item => {
            html += '<tr>';
            headings.forEach(h => {
                const key = h.key;
                const valueType = h.valueType;
                let cellData = item[key] !== undefined ? item[key] : '-';

                // Format specific value types
                if (valueType === 'url' && cellData !== '-') {
                    // Truncate long URLs for UI clarity
                    const displayUrl = cellData.length > 60 ? cellData.substring(0, 60) + '...' : cellData;
                    cellData = `<a href="${cellData}" target="_blank" title="${cellData}">${displayUrl}</a>`;
                } else if (valueType === 'bytes') {
                    cellData = (cellData / 1024).toFixed(1) + ' KB';
                } else if (valueType === 'ms') {
                    cellData = cellData.toFixed(0) + ' ms';
                } else if (typeof cellData === 'object' && cellData.url) {
                     // Handle nested node/url objects (like elements causing CLS)
                     cellData = `<span title="${cellData.selector || ''}">${cellData.url || cellData.snippet || 'Element'}</span>`;
                }

                html += `<td>${cellData}</td>`;
            });
            html += '</tr>';
        });

        html += '</tbody></table>';
        return html;
    }

    // Helper: Toggle Accordion
    function toggleAccordion(element) {
        const body = element.nextElementSibling;
        body.classList.toggle('active');
    }

    // Helper: Remove Markdown links from Google's descriptions
    function formatDescription(text) {
        return text.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');
    }

    // Helper: Color based on score
    function getColorClass(score) {
        if (score >= 0.9) return 'score-pass';
        if (score >= 0.5) return 'score-avg';
        return 'score-fail';
    }
</script>

</body>
</html>
